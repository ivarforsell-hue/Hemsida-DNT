<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skola — DNT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .school-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .gleerups-btn {
            display: inline-block;
            padding: 40px 80px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(184,77,255,0.4), 0 0 80px rgba(0,212,255,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }
        .gleerups-btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.2), transparent);
            animation: rotate-border 3s linear infinite;
        }
        .gleerups-btn span {
            position: relative;
            z-index: 1;
        }
        .gleerups-btn:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 0 60px rgba(184,77,255,0.6), 0 0 120px rgba(0,212,255,0.4);
        }
        .gleerups-btn:active {
            transform: scale(0.98);
        }
        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="school-page">
        <a href="https://gleerups.se" target="_blank" rel="noopener noreferrer" class="gleerups-btn">
            <span>📚 Öppna Gleerups</span>
        </a>
    </div>
</body>
</html>
